services:

  nginx:
    ports:
      - "4001:80"
    volumes:
      - ./php:/var/www/html
      - ./nginx/nginx.config:/etc/nginx/conf.d/default.conf:ro

  php:
    volumes:
      - ./php:/var/www/html

  mysql:
    environment:
      MYSQL_DATABASE: testdb
      MYSQL_USER: student
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password

  phpmyadmin:
    ports:
      - "6001:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306